<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slán Safety — Plant &amp; Equipment</title>
<style>
:root{
  --deep:#1B3A2D; --mid:#2D6A45; --gold:#B8960C; --gold-l:#D4AA30;
  --bg:#F0F3F1; --card:#FFFFFF; --border:#D4DEDB;
  --t1:#1A2E25; --t2:#4B6358; --t3:#7A938B;
  --pass:#1B6E3A; --pass-bg:#E9F6EE;
  --warn:#A06000; --warn-bg:#FFF6E6;
  --fail:#A32D2D; --fail-bg:#FBECEC;
  --r:12px; --rs:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:15px;line-height:1.5;padding-bottom:44px}
.topbar{background:var(--deep);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand{display:flex;flex-direction:column;line-height:1.15}
.brand b{color:var(--gold-l);font-size:16px;font-weight:700;letter-spacing:.02em}
.brand span{color:#9FC4AE;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase}
.who{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 12px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.wrap{max-width:560px;margin:0 auto;padding:18px 16px}
.h1{font-size:21px;font-weight:700;color:var(--deep);margin-bottom:3px}
.sub{font-size:13px;color:var(--t2);margin-bottom:18px}
.back{background:#fff;color:var(--deep);border:1.5px solid var(--border);border-radius:var(--rs);width:auto;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:14px}
/* machine list */
.asset{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:11px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:box-shadow .15s,border-color .15s;text-align:left;width:100%;font-family:inherit}
.asset:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);border-color:var(--gold)}
.a-ic{width:46px;height:46px;border-radius:10px;background:#EAF1ED;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.a-main{flex:1;min-width:0}
.a-code{font-size:15px;font-weight:700;color:var(--t1)}
.a-mm{font-size:12.5px;color:var(--t2)}
.a-badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.bg-op{background:var(--pass-bg);color:var(--pass)}
.bg-flt{background:var(--warn-bg);color:var(--warn)}
.bg-out{background:var(--fail-bg);color:var(--fail)}
.chev{color:var(--t3);font-size:20px;flex-shrink:0}
/* hub */
.hub-head{background:var(--deep);color:#fff;border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:14px}
.hub-ic{width:54px;height:54px;border-radius:12px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.hub-code{font-size:19px;font-weight:800;letter-spacing:.01em}
.hub-mm{font-size:12.5px;color:#9FC4AE}
.hub-hours{font-size:11.5px;color:#cfe0d6;margin-top:3px}
.scan-note{font-size:11px;color:var(--t3);text-align:center;margin:-6px 0 14px}
.cta{display:block;width:100%;padding:16px;border-radius:var(--rs);border:none;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;text-align:center;background:var(--mid);color:#fff;margin-bottom:16px}
.sec-h{font-size:11px;font-weight:800;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;margin:18px 2px 8px}
.tile{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #EEF2F0;cursor:pointer;text-align:left;width:100%;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit}
.tile .row:last-child{border-bottom:none}
.row-ic{width:30px;text-align:center;font-size:17px;flex-shrink:0}
.row-main{flex:1;min-width:0}
.row-t{font-size:14px;font-weight:600;color:var(--t1)}
.row-s{font-size:11.5px;color:var(--t2)}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px}
.lift{background:var(--gold-l);color:#3a2c00;border-radius:var(--r);padding:13px 15px;margin-top:10px;font-size:12.5px;font-weight:600;line-height:1.7}
.lift b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;color:#5a4400}
.svc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.svc-row{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0}
.svc-row span:first-child{color:var(--t2)}
.svc-row span:last-child{font-weight:600}
.btn-ghost{display:block;width:100%;padding:13px;border-radius:var(--rs);border:1.5px solid var(--border);background:#fff;color:var(--deep);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;margin-top:11px}
.spend{display:flex;gap:10px;margin-top:10px}
.spend div{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.spend b{display:block;font-size:18px;color:var(--deep)}
.spend small{font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
/* gate */
.gate-hero{padding:30px 20px 22px;text-align:center;border-radius:var(--r) var(--r) 0 0;color:#fff}
.gate-hero.green{background:linear-gradient(135deg,#1B6E3A,#13502A)}
.gate-hero.amber{background:linear-gradient(135deg,#A06000,#7A4A00)}
.gate-hero.red{background:linear-gradient(135deg,#A32D2D,#7E2020)}
.gate-ic{width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:38px}
.gate-title{font-size:21px;font-weight:800}
.gate-asset{font-size:13px;color:rgba(255,255,255,.8);margin-top:5px}
.gate-msg{font-size:14px;font-weight:600;background:rgba(0,0,0,.12);border-radius:9px;padding:11px 14px;margin:16px 16px 0;line-height:1.45}
.panel{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:16px;margin-bottom:18px}
.check{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid #EEF2F0}
.check:last-child{border-bottom:none}
.ck-dot{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;margin-top:1px}
.ck-pass{background:var(--pass)} .ck-warn{background:var(--warn)} .ck-fail{background:var(--fail)}
.ck-name{font-size:13.5px;font-weight:600;color:var(--t1)}
.ck-detail{font-size:12px;color:var(--t2);margin-top:1px}
.btn{display:block;width:100%;padding:15px;border-radius:var(--rs);border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;margin-top:6px}
.btn-green{background:var(--pass);color:#fff}
.btn-amber{background:var(--warn);color:#fff}
.ovr{background:var(--warn-bg);border:1px solid #EAD2A0;border-radius:var(--rs);padding:14px;margin-top:14px}
.ovr label{font-size:12.5px;font-weight:700;color:var(--warn);display:block;margin-bottom:6px}
.ovr input,.ovr textarea{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;margin-bottom:10px;outline:none}
.notify{font-size:12.5px;color:var(--fail);font-weight:600;text-align:center;margin-top:6px}
/* prestart checklist */
.ps-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:9px}
.ps-q{font-size:14px;font-weight:600;margin-bottom:9px}
.seg{display:flex;gap:8px}
.seg button{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--t2)}
.seg button.p.on{background:var(--pass);color:#fff;border-color:var(--pass)}
.seg button.f.on{background:var(--fail);color:#fff;border-color:var(--fail)}
.ps-field{margin-bottom:12px}
.ps-field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.ps-field input,.ps-field textarea{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;outline:none}
/* sheet */
.sheet-bk{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.sheet-bk.on{display:flex}
.sheet{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:560px;padding:20px 16px calc(28px + env(safe-area-inset-bottom))}
.sheet h3{font-size:16px;color:var(--deep);margin-bottom:4px}
.sheet p{font-size:12.5px;color:var(--t2);margin-bottom:14px}
.wbtn{width:100%;text-align:left;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:13px;margin-bottom:9px;cursor:pointer;font-family:inherit}
.wbtn b{font-size:14px;color:var(--t1)} .wbtn span{display:block;font-size:11.5px;color:var(--t2);margin-top:2px}
.demobar{position:fixed;bottom:0;left:0;right:0;background:var(--deep);color:var(--gold-l);font-size:11px;font-weight:600;text-align:center;padding:7px;z-index:40;letter-spacing:.05em}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><b>Slán Safety</b><span>Plant &amp; Equipment</span></div>
  <button class="who" onclick="openWorkerSheet()"><span id="who-name">—</span></button>
</div>

<div class="wrap" id="screen-list">
  <div class="h1">Plant &amp; Equipment</div>
  <div class="sub">Scan a machine's QR — or tap one below — to open its pre-start, manuals and records.</div>
  <div id="asset-list"></div>
</div>

<div class="wrap" id="screen-detail" style="display:none"></div>
<div class="wrap" id="screen-oversight" style="display:none"></div>

<div class="sheet-bk" id="worker-sheet" onclick="if(event.target===this)closeWorkerSheet()">
  <div class="sheet">
    <h3>View as worker</h3>
    <p>Switch operator to see how the Ticket Gate responds — green, amber or red.</p>
    <div id="worker-btns"></div>
  </div>
</div>

<div class="demobar">DEMO — sample data</div>

<script>
/* ---------- helpers ---------- */
function dOffset(days){ var d=new Date(); d.setDate(d.getDate()+days); return d; }
function iso(d){ return d.toISOString().slice(0,10); }
function fmt(d){ return new Date(d).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}); }
function fmtShort(d){ return new Date(d).toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }
function daysBetween(a,b){ return Math.round((new Date(a)-new Date(b))/86400000); }
function money(n){ return '$'+Number(n).toLocaleString('en-AU'); }

var LIC={ white_card:'White Card', excavator:'Excavator ticket', telehandler:'Telehandler ticket',
  hrwl_LF:'Forklift (LF) High Risk Work Licence', bulldozer:'Dozer ticket', drivers_C:'Car Licence (C)',
  hrwl_C2:'Slewing Crane ticket (C2)' };
function licName(c){ return LIC[c]||c; }

/* ---------- WORKERS ---------- */
var WORKERS=[
  { id:'w1', name:"Liam O'Brien", trade:'Plant Operator', induction_expiry:iso(dOffset(300)),
    tickets:[ {cls:'white_card',expiry:iso(dOffset(900)),verified:true},
              {cls:'excavator',expiry:iso(dOffset(400)),verified:true},
              {cls:'hrwl_LF',expiry:iso(dOffset(380)),verified:true} ],
    voc:[ {cls:'excavator',make:'Caterpillar',model:'320'} ] },
  { id:'w2', name:'Tom Walker', trade:'Plant Operator', induction_expiry:iso(dOffset(200)),
    tickets:[ {cls:'white_card',expiry:iso(dOffset(900)),verified:true},
              {cls:'excavator',expiry:iso(dOffset(14)),verified:true},
              {cls:'hrwl_LF',expiry:iso(dOffset(300)),verified:true} ],
    voc:[ {cls:'excavator',make:'Caterpillar',model:'320'} ] },
  { id:'w3', name:'Jake Murray', trade:'Labourer', induction_expiry:iso(dOffset(200)),
    tickets:[ {cls:'white_card',expiry:iso(dOffset(900)),verified:true} ], voc:[] },
  { id:'w4', name:'Pete Singh', trade:'Plant Operator', induction_expiry:iso(dOffset(200)),
    tickets:[ {cls:'white_card',expiry:iso(dOffset(900)),verified:true},
              {cls:'excavator',expiry:iso(dOffset(-30)),verified:true} ], voc:[] }
];

/* ---------- ASSETS ---------- */
var ASSETS=[
  { code:'EXC-001', type:'Excavator', icon:'🚧', make:'Caterpillar', model:'320', status:'operational',
    required:['excavator'], voc_required:true, rego_expiry:null, insurance_expiry:iso(dOffset(200)),
    hours:4146, service_last:iso(dOffset(-40)), service_due:iso(dOffset(60)), critical_fault:false, spend12mo:8240 },
  { code:'FLT-002', type:'Forklift', icon:'🏭', make:'Toyota', model:'8FG25', status:'operational',
    required:['hrwl_LF'], voc_required:false, rego_expiry:null, insurance_expiry:iso(dOffset(200)),
    hours:2210, service_last:iso(dOffset(-20)), service_due:iso(dOffset(40)), critical_fault:false, spend12mo:3110 },
  { code:'TLH-003', type:'Telehandler', icon:'🔧', make:'Manitou', model:'MT1840', status:'operational',
    required:['telehandler'], voc_required:false, rego_expiry:null, insurance_expiry:iso(dOffset(150)),
    hours:3580, service_last:iso(dOffset(-90)), service_due:iso(dOffset(20)), critical_fault:false, spend12mo:5980,
    swl:'4,000 kg', lift_note:'Max lift height 17.5 m · See load chart for SWL at radius' },
  { code:'CRN-007', type:'Slewing Crane', icon:'🏗️', make:'Franna', model:'AT-40', status:'operational',
    required:['hrwl_C2'], voc_required:true, rego_expiry:iso(dOffset(120)), insurance_expiry:iso(dOffset(200)),
    hours:6820, service_last:iso(dOffset(-25)), service_due:iso(dOffset(80)), critical_fault:false, spend12mo:14250,
    swl:'40 t', lift_note:'SWL 40 t @ min radius · De-rates with radius — refer load chart on hook' },
  { code:'GEN-005', type:'Generator', icon:'⚡', make:'Denyo', model:'DCA-45', status:'operational',
    required:[], voc_required:false, rego_expiry:null, insurance_expiry:iso(dOffset(200)),
    hours:1180, service_last:iso(dOffset(-200)), service_due:iso(dOffset(-12)), critical_fault:false, spend12mo:640 },
  { code:'UTE-12', type:'Ute', icon:'🛻', make:'Toyota', model:'Hilux', status:'operational',
    required:['drivers_C'], voc_required:false, rego_expiry:iso(dOffset(-9)), insurance_expiry:iso(dOffset(150)),
    hours:0, service_last:iso(dOffset(-30)), service_due:iso(dOffset(90)), critical_fault:false, spend12mo:1890 }
];

/* docs per machine (type-specific extras for crane/telehandler) */
function getDocs(a){
  var d=[ {ic:'📘',t:'Operator Manual',s:a.make+' '+a.model},
          {ic:'🛠️',t:'Service Manual',s:'Maintenance & schedules'},
          {ic:'⚠️',t:'Risk Assessment',s:'Plant risk assessment'},
          {ic:'📄',t:'SWMS',s:'Safe Work Method Statement'} ];
  if(a.type==='Slewing Crane'||a.type==='Telehandler'){
    d.push({ic:'🟢',t:'Periodic Inspection (Green Sticker)',s:'Current — next due '+fmt(a.service_due)});
    d.push({ic:'📈',t:'Load Chart / SWL',s:'SWL '+(a.swl||'—')+' · de-rates with radius'});
    d.push({ic:'📓',t:'Plant Logbook',s:'Lift & inspection log'});
  }
  return d;
}
/* recent prestarts (last 7 days) */
function recentPrestarts(a){
  var names=["Liam O'Brien",'Tom Walker','Mark Flynn','Lee O\'Brien'];
  var out=[]; var n=(a.code.charCodeAt(4)%3)+3;
  for(var i=0;i<n;i++){ out.push({ date:iso(dOffset(-(i+ (a.code.charCodeAt(5)%2)))), worker:names[(i+a.code.length)%names.length], outcome:(i===1&&a.status==='fault_reported')?'fault':'ok' }); }
  return out;
}

var currentWorker=WORKERS[0];
var curAsset=0;

/* ---------- TICKET GATE (verified) ---------- */
function ticketGate(w, a){
  var today=new Date(); today.setHours(0,0,0,0);
  var checks=[];
  function add(name,status,detail){ checks.push({name:name,status:status,detail:detail}); }
  if(a.status==='out_of_service'||a.status==='retired'){ add('Machine availability','fail','This machine is '+a.status.replace('_',' ')+' and must not be operated.'); }
  else { add('Machine availability','pass','Machine is available for use.'); }
  if(a.critical_fault){ add('Open critical fault','fail','This machine has an open critical fault. Do not operate.'); }
  else if(a.status==='fault_reported'){ add('Reported fault','warn','A fault has been reported on this machine — supervisor sign-off required.'); }
  if(a.rego_expiry){
    if(new Date(a.rego_expiry)<today){ add('Registration','fail','Registration expired '+fmt(a.rego_expiry)+'.'); }
    else { add('Registration','pass','Registered to '+fmt(a.rego_expiry)+'.'); }
  }
  if(a.insurance_expiry){ if(new Date(a.insurance_expiry)<today){ add('Insurance','fail','Insurance expired '+fmt(a.insurance_expiry)+'.'); } }
  (a.required||[]).forEach(function(cls){
    var t=w.tickets.find(function(x){return x.cls===cls;});
    if(!t){ add('Holds '+licName(cls),'fail','You do not hold a '+licName(cls)+'.'); return; }
    var exp=t.expiry?new Date(t.expiry):null;
    if(exp && exp<today){ add('Holds '+licName(cls),'fail','Your '+licName(cls)+' expired '+fmt(t.expiry)+'.'); return; }
    if(exp){ var d=daysBetween(t.expiry,today);
      if(d<=30){ add('Holds '+licName(cls),'warn','Your '+licName(cls)+' expires in '+d+' day'+(d===1?'':'s')+' ('+fmt(t.expiry)+').'); return; }
      if(d<=60){ add('Holds '+licName(cls),'warn','Your '+licName(cls)+' expires in '+d+' days — renew soon.'); return; } }
    add('Holds '+licName(cls),'pass',licName(cls)+' current to '+fmt(t.expiry)+(t.verified?'':' (not yet verified).'));
  });
  if(a.voc_required){
    var v=(w.voc||[]).find(function(x){return x.make===a.make && x.model===a.model;});
    if(v){ add('Verification of Competency','pass','VOC on file for '+a.make+' '+a.model+'.'); }
    else { add('Verification of Competency','warn','No VOC on file for '+a.make+' '+a.model+' — supervisor sign-off required.'); }
  }
  if(w.induction_expiry && new Date(w.induction_expiry)<today){ add('Site induction','warn','Your induction is overdue for renewal.'); }
  if(a.service_due && new Date(a.service_due)<today){ add('Service currency','warn','Machine service is overdue (due '+fmt(a.service_due)+').'); }
  var hasFail=checks.some(function(c){return c.status==='fail';});
  var hasWarn=checks.some(function(c){return c.status==='warn';});
  var outcome=hasFail?'red':(hasWarn?'amber':'green');
  var first=(checks.filter(function(c){return c.status==='fail';})[0]) || (checks.filter(function(c){return c.status==='warn';})[0]);
  var msg = outcome==='green' ? 'You are authorised to operate '+a.code+' — '+a.make+' '+a.model+'.' : (first?first.detail:'');
  return { outcome:outcome, canProceed:outcome!=='red', requiresOverride:outcome==='amber', checks:checks, primary_message:msg };
}

/* ---------- machine list ---------- */
function badge(a){
  if(a.status==='operational') return '<span class="a-badge bg-op">Operational</span>';
  if(a.status==='fault_reported') return '<span class="a-badge bg-flt">Fault reported</span>';
  return '<span class="a-badge bg-out">'+a.status.replace('_',' ')+'</span>';
}
function renderAssets(){
  document.getElementById('asset-list').innerHTML = ASSETS.map(function(a,i){
    return '<button class="asset" onclick="openHub('+i+')">'+
      '<div class="a-ic">'+a.icon+'</div>'+
      '<div class="a-main"><div class="a-code">'+a.code+'</div><div class="a-mm">'+a.type+' · '+a.make+' '+a.model+'</div></div>'+
      badge(a)+'<div class="chev">›</div></button>';
  }).join('');
}
function showList(){
  document.getElementById('screen-detail').style.display='none';
  var ov=document.getElementById('screen-oversight'); if(ov) ov.style.display='none';
  document.getElementById('screen-list').style.display='block';
  window.scrollTo(0,0);
}
function showDetail(html){
  var el=document.getElementById('screen-detail');
  el.innerHTML=html;
  document.getElementById('screen-list').style.display='none';
  var ov=document.getElementById('screen-oversight'); if(ov) ov.style.display='none';
  el.style.display='block';
  window.scrollTo(0,0);
}

/* ---------- machine hub (QR landing) ---------- */
function openHub(i){
  curAsset=i; var a=ASSETS[i];
  var docs=getDocs(a).map(function(d){
    return '<button class="row" onclick="alert(\'Opens: '+d.t.replace(/'/g,'')+'\')"><div class="row-ic">'+d.ic+'</div><div class="row-main"><div class="row-t">'+d.t+'</div><div class="row-s">'+d.s+'</div></div><div class="chev">›</div></button>';
  }).join('');
  var rec=recentPrestarts(a).map(function(p){
    var col=p.outcome==='fault'?'var(--warn)':'var(--pass)';
    var lbl=p.outcome==='fault'?'Fault flagged':'Completed';
    return '<div class="row" style="cursor:default"><div class="row-ic"><span class="dot" style="background:'+col+'"></span></div><div class="row-main"><div class="row-t">'+fmtShort(p.date)+' · '+p.worker+'</div><div class="row-s">'+lbl+'</div></div></div>';
  }).join('');
  var svcOverdue=new Date(a.service_due)<new Date();
  var lift = a.lift_note ? '<div class="lift"><b>Lifting data</b>SWL '+(a.swl||'—')+'<br>'+a.lift_note+'</div>' : '';
  var html='<div class="wrap" style="padding:0;max-width:none">'+
    '<button class="back" onclick="showList()">‹ All machines</button>'+
    '<div class="hub-head"><div class="hub-ic">'+a.icon+'</div><div style="flex:1"><div class="hub-code">'+a.code+'</div><div class="hub-mm">'+a.type+' · '+a.make+' '+a.model+'</div><div class="hub-hours">'+(a.hours?a.hours.toLocaleString()+' hrs':'')+' · '+a.status.replace('_',' ')+'</div></div></div>'+
    '<div class="scan-note">📷 Opened by scanning the QR on this machine</div>'+
    '<button class="cta" onclick="openGate()">▶  Start Pre-Start</button>'+
    '<div class="sec-h">Documents</div><div class="tile">'+docs+'</div>'+ lift +
    '<div class="sec-h">Recent pre-starts (last 7 days)</div><div class="tile">'+(rec||'<div class="row" style="cursor:default"><div class="row-main"><div class="row-s">No pre-starts in the last 7 days.</div></div></div>')+'</div>'+
    '<div class="sec-h">Service</div><div class="svc">'+
      '<div class="svc-row"><span>Last service</span><span>'+fmt(a.service_last)+'</span></div>'+
      '<div class="svc-row"><span>Next due</span><span style="color:'+(svcOverdue?'var(--fail)':'var(--pass)')+'">'+fmt(a.service_due)+(svcOverdue?' · OVERDUE':'')+'</span></div>'+
      '<div class="svc-row"><span>Hours</span><span>'+(a.hours?a.hours.toLocaleString()+' hrs':'—')+'</span></div>'+
      '<button class="btn-ghost" onclick="alert(\'Opens the service template for the mechanic to complete.\')">Open service template</button>'+
    '</div>'+
    '</div>';
  showDetail(html);
}

/* ---------- gate ---------- */
function openGate(){
  var a=ASSETS[curAsset];
  var r=ticketGate(currentWorker,a);
  var titles={green:'Authorised',amber:'Supervisor Approval Required',red:'Not Authorised'};
  var icons={green:'✓',amber:'⚠',red:'✕'};
  var html='<div class="wrap" style="padding:0;max-width:none">'+
    '<button class="back" onclick="openHub(curAsset)">‹ Back</button>'+
    '<div class="gate-hero '+r.outcome+'"><div class="gate-ic">'+icons[r.outcome]+'</div><div class="gate-title">'+titles[r.outcome]+'</div>'+
      '<div class="gate-asset">'+currentWorker.name+'  ·  '+a.code+' '+a.make+' '+a.model+'</div></div>'+
    '<div class="gate-msg '+r.outcome+'">'+r.primary_message+'</div>'+
    '<div class="panel">'+
      r.checks.map(function(c){ var cls=c.status==='pass'?'ck-pass':(c.status==='warn'?'ck-warn':'ck-fail'); var sym=c.status==='pass'?'✓':(c.status==='warn'?'!':'✕');
        return '<div class="check"><div class="ck-dot '+cls+'">'+sym+'</div><div><div class="ck-name">'+c.name+'</div><div class="ck-detail">'+c.detail+'</div></div></div>'; }).join('');
  if(r.outcome==='green'){ html+='<button class="btn btn-green" onclick="openPrestart()">Begin Pre-Start →</button>'; }
  else if(r.outcome==='amber'){ html+='<div class="ovr"><label>Supervisor PIN to override</label><input id="ovr-pin" type="tel" inputmode="numeric" placeholder="Enter 4-digit PIN" maxlength="4"><label>Reason for override</label><textarea id="ovr-reason" rows="2" placeholder="e.g. Renewal booked, supervisor approved for today"></textarea><button class="btn btn-amber" onclick="doOverride()">Override &amp; Begin Pre-Start</button></div><button class="btn-ghost" onclick="openHub(curAsset)">Cancel</button>'; }
  else { html+='<div class="notify">✉ Your supervisor has been notified.</div><button class="btn-ghost" onclick="openHub(curAsset)">Back to machine</button>'; }
  html+='</div></div>';
  showDetail(html);
}
function doOverride(){
  var pin=(document.getElementById('ovr-pin').value||'').trim();
  var reason=(document.getElementById('ovr-reason').value||'').trim();
  if(pin!=='4827'){ alert('Incorrect supervisor PIN.'); return; }
  if(!reason){ alert('Please enter a reason for the override.'); return; }
  openPrestart();
}

/* ---------- pre-start checklist ---------- */
var CHECKLIST=['Engine oil & coolant levels','Hydraulic hoses & leaks','Tyres / tracks & undercarriage','Lights, beacon & horn','Reversing alarm & camera','Seatbelt & ROPS/FOPS','Fire extinguisher present & charged','Guards & emergency stop','Bucket / attachment & pins','General condition & cleanliness'];
function openPrestart(){
  var a=ASSETS[curAsset];
  var items=CHECKLIST.map(function(q,idx){
    return '<div class="ps-item"><div class="ps-q">'+(idx+1)+'. '+q+'</div><div class="seg"><button type="button" class="p" id="ps'+idx+'p" onclick="psSet('+idx+',\'p\')">✓ Pass</button><button type="button" class="f" id="ps'+idx+'f" onclick="psSet('+idx+',\'f\')">✕ Fault</button></div></div>';
  }).join('');
  var html='<div class="wrap" style="padding:0;max-width:none">'+
    '<button class="back" onclick="openHub(curAsset)">‹ Back</button>'+
    '<div class="h1">Pre-Start — '+a.code+'</div><div class="sub">'+a.make+' '+a.model+' · '+currentWorker.name+'</div>'+
    '<div class="ps-field"><label>Machine hours</label><input id="ps-hours" type="number" value="'+(a.hours||'')+'"></div>'+
    items+
    '<div class="ps-field" id="ps-fault-wrap" style="display:none"><label>Describe the fault</label><textarea id="ps-fault" rows="2" placeholder="What\'s wrong? This raises a work order to the mechanic."></textarea></div>'+
    '<div class="ps-item"><div class="ps-q">I confirm I am fit for work and the above is accurate.</div><div class="seg"><button type="button" class="p" id="ps-fit" onclick="this.classList.toggle(\'on\')">✓ Confirm</button></div></div>'+
    '<button class="btn btn-green" onclick="submitPrestart()">Submit Pre-Start</button>'+
    '</div>';
  showDetail(html);
}
var psState={};
function psSet(i,v){
  psState[i]=v;
  document.getElementById('ps'+i+'p').classList.toggle('on',v==='p');
  document.getElementById('ps'+i+'f').classList.toggle('on',v==='f');
  var anyFault=Object.keys(psState).some(function(k){return psState[k]==='f';});
  document.getElementById('ps-fault-wrap').style.display=anyFault?'block':'none';
}
function submitPrestart(){
  var a=ASSETS[curAsset];
  var done=Object.keys(psState).length;
  if(done<CHECKLIST.length){ alert('Please mark every item Pass or Fault ('+done+' of '+CHECKLIST.length+' done).'); return; }
  if(!document.getElementById('ps-fit').classList.contains('on')){ alert('Please confirm you are fit for work.'); return; }
  var faults=Object.keys(psState).filter(function(k){return psState[k]==='f';}).length;
  var msg='Pre-Start submitted for '+a.code+'.\n\nSaved against '+currentWorker.name+' and the machine record.';
  if(faults>0){ msg+='\n\n⚠ '+faults+' fault(s) flagged → a work order has been raised and sent to the mechanic.'; a.status='fault_reported'; }
  alert(msg);
  psState={};
  renderAssets();
  showList();
}

/* ---------- worker switch ---------- */
function openWorkerSheet(){
  document.getElementById('worker-btns').innerHTML = WORKERS.map(function(w,i){
    return '<button class="wbtn" onclick="pickWorker('+i+')"><b>'+w.name+'</b><span>'+w.trade+'</span></button>';
  }).join('');
  document.getElementById('worker-sheet').classList.add('on');
}
function closeWorkerSheet(){ document.getElementById('worker-sheet').classList.remove('on'); }
function pickWorker(i){ currentWorker=WORKERS[i]; document.getElementById('who-name').textContent=currentWorker.name; closeWorkerSheet(); showList(); }

/* ---------- manager / supervisor oversight ---------- */
function getRole(){ var m=/[?&]role=([a-z]+)/.exec(location.search); return m?m[1]:'worker'; }
function getSiteParam(){ var m=/[?&]site=([^&]+)/.exec(location.search); return m?decodeURIComponent(m[1]):null; }
var PLANT_SITE_BY_CODE={ 'EXC-001':'Parramatta','FLT-002':'Parramatta','UTE-12':'Parramatta','TLH-003':'Blacktown','GEN-005':'Blacktown','CRN-007':'Liverpool','DOZ-004':'Liverpool' };
function assetSite(code){ return PLANT_SITE_BY_CODE[code]||'Parramatta'; }
var PLANT_SITES=['Parramatta','Blacktown','Liverpool'];
var oversightSite='All';
function plantSetSite(s){ oversightSite=s; renderOversight(); }
var WORKORDERS=[
  {wo:'WO-2026-0041', code:'DOZ-004', machine:'Komatsu D61 Dozer', fault:'Hydraulic leak at boom cylinder — flagged on a pre-start', priority:'High', status:'Raised', raised:"today · Lee O'Brien"},
  {wo:'WO-2026-0039', code:'GEN-005', machine:'Denyo DCA-45 Generator', fault:'250 hr service overdue', priority:'Medium', status:'In progress', raised:'2 days ago · scheduled'},
  {wo:'WO-2026-0036', code:'FLT-002', machine:'Toyota 8FG25 Forklift', fault:'Reversing alarm intermittent', priority:'Low', status:'Awaiting parts', raised:'4 days ago · Mark Flynn'}
];
function _prioCol(p){ return p==='High'?'#A32D2D':(p==='Medium'?'#A06000':'#4B6358'); }
function renderOversight(){
  var supLocked = (getRole()==='supervisor');
  if(supLocked){ oversightSite = getSiteParam() || 'Parramatta'; }
  document.getElementById('who-name').textContent = supLocked ? (oversightSite+' Supervisor') : 'Manager view';
  var siteMatch=function(code){ return oversightSite==='All' || assetSite(code)===oversightSite; };
  var open=WORKORDERS.filter(function(w){ return w.status!=='Returned to service' && siteMatch(w.code); });
  var woHtml=open.map(function(w){
    var idx=WORKORDERS.indexOf(w);
    return '<button class="row" onclick="openWO('+idx+')"><div class="row-ic"><span class="dot" style="background:'+_prioCol(w.priority)+'"></span></div><div class="row-main"><div class="row-t">'+w.code+' · '+w.machine+'</div><div class="row-s">'+assetSite(w.code)+' · '+w.fault+'</div></div><span class="a-badge bg-flt" style="flex-shrink:0">'+w.status+'</span></button>';
  }).join('');
  var t=new Date();
  var need=ASSETS.filter(function(a){ return siteMatch(a.code) && (a.status!=='operational' || new Date(a.service_due)<t || (a.rego_expiry && new Date(a.rego_expiry)<t)); });
  var attHtml=need.map(function(a){
    var reason = a.status!=='operational'?a.status.replace('_',' '):((a.rego_expiry&&new Date(a.rego_expiry)<t)?'Registration expired':'Service overdue');
    return '<div class="row" style="cursor:default"><div class="row-ic">'+a.icon+'</div><div class="row-main"><div class="row-t">'+a.code+' · '+a.make+' '+a.model+'</div><div class="row-s" style="color:#A06000">'+assetSite(a.code)+' · '+reason+'</div></div></div>';
  }).join('');
  var chipRow='';
  if(!supLocked){
    chipRow='<div style="display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px;padding-bottom:4px">'+['All'].concat(PLANT_SITES).map(function(s){
      var on=(s===oversightSite),label=(s==='All')?'All sites':s;
      return '<button onclick="plantSetSite(\''+s+'\')" style="padding:6px 13px;border-radius:16px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;border:1.5px solid '+(on?'#B8960C':'#D8D8D8')+';background:'+(on?'#B8960C':'#fff')+';color:'+(on?'#fff':'#666')+'">'+label+'</button>';
    }).join('')+'</div>';
  }
  var subText = supLocked ? (oversightSite+' — your site only') : (oversightSite==='All'?'All sites':oversightSite);
  var html='<div class="h1">Plant — Fleet</div><div class="sub">'+subText+' · work orders, attention &amp; register.</div>'+
    chipRow+
    '<div class="sec-h">Open work orders ('+open.length+')</div><div class="tile">'+(woHtml||'<div class="row" style="cursor:default"><div class="row-main"><div class="row-s">No open work orders.</div></div></div>')+'</div>'+
    '<div class="sec-h">Machines needing attention</div><div class="tile">'+(attHtml||'<div class="row" style="cursor:default"><div class="row-main"><div class="row-s">All machines operational.</div></div></div>')+'</div>'+
    '<button class="cta" style="margin-top:16px" onclick="showList()">View all machines →</button>';
  var ov=document.getElementById('screen-oversight'); ov.innerHTML=html;
  document.getElementById('screen-list').style.display='none';
  document.getElementById('screen-detail').style.display='none';
  ov.style.display='block';
  window.scrollTo(0,0);
}
function openWO(i){
  var w=WORKORDERS[i]; if(!w) return;
  var html='<div class="wrap" style="padding:0;max-width:none">'+
    '<button class="back" onclick="renderOversight()">‹ Work orders</button>'+
    '<div class="hub-head"><div class="hub-ic">🛠️</div><div style="flex:1"><div class="hub-code">'+w.wo+'</div><div class="hub-mm">'+w.code+' · '+w.machine+'</div><div class="hub-hours">'+w.priority+' priority · '+w.status+'</div></div></div>'+
    '<div class="sec-h">Reported fault</div><div class="tile"><div class="row" style="cursor:default"><div class="row-main"><div class="row-t">'+w.fault+'</div><div class="row-s">Raised '+w.raised+'</div></div></div></div>'+
    '<button class="cta" style="background:var(--pass);margin-top:16px" onclick="completeWO(\''+w.wo+'\')">Complete &amp; return machine to service</button>'+
    '</div>';
  showDetail(html);
}
function completeWO(wo){
  var w=WORKORDERS.find(function(x){return x.wo===wo;}); if(w){ w.status='Returned to service'; }
  alert('Work order '+wo+' completed.\nMachine marked returned to service.');
  renderOversight();
}

/* ---------- init ---------- */
document.getElementById('who-name').textContent=currentWorker.name;
renderAssets();
(function(){
  // QR deep-link: plant.html?machine=EXC-001 opens straight to that machine's hub
  var m=/[?&]machine=([^&]+)/.exec(location.search);
  var code=m?decodeURIComponent(m[1]).toUpperCase():null;
  if(code){ var idx=-1; ASSETS.forEach(function(a,i){ if(a.code===code) idx=i; }); if(idx>-1){ openHub(idx); return; } }
  if(['manager','supervisor','director'].indexOf(getRole())>-1) renderOversight();
})();
</script>
</body>
</html>
