<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slán Safety — Plant &amp; Equipment</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --deep:#1B3A2D; --mid:#2D6A45; --gold:#B8960C; --gold-l:#D4AF37;
  --bg:#F2F3F2; --card:#FFFFFF; --border:#D4DEDB;
  --t1:#0F1F17; --t2:#5C6B62; --t3:#7A938B;
  --pass:#1B6E3A; --pass-bg:#E9F6EE;
  --warn:#A06000; --warn-bg:#FFF6E6;
  --fail:#A32D2D; --fail-bg:#FBECEC;
  --r:14px; --rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:15px;line-height:1.5;padding-bottom:44px}
.sb{height:calc(env(safe-area-inset-top,0px) + 10px);background:var(--deep)}
.topbar{background:var(--deep);padding:10px 16px 16px;position:sticky;top:0;z-index:50}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tbar-logo img{height:90px;object-fit:contain;display:block}
.back-btn{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.back-btn:hover{background:rgba(255,255,255,.18)}
.back-btn svg{width:20px;height:20px}
.tb-spacer{width:36px;flex-shrink:0}
.hdr-bottom{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:14px}
.form-greeting{flex:1;min-width:0}
.form-greeting h1{font-size:21px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1.2;margin:0}
.form-greeting p{font-size:12.5px;color:rgba(255,255,255,.7);margin:4px 0 0}
.profile-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(184,150,12,.25);border:1.5px solid rgba(184,150,12,.55);color:#fff;font-size:11px;font-weight:700;letter-spacing:.3px;padding:7px 12px;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.profile-btn:hover{background:rgba(184,150,12,.38)}
.badge-dir{background:rgba(184,150,12,.25);border:1.5px solid rgba(184,150,12,.5);color:#B8960C;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:5px 11px;border-radius:20px;white-space:nowrap}
.who{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 12px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.wrap{max-width:560px;margin:0 auto;padding:18px 16px}
.h1{font-size:21px;font-weight:700;color:var(--deep);margin-bottom:3px}
.sub{font-size:13px;color:var(--t2);margin-bottom:18px}
.back{background:#fff;color:var(--deep);border:1.5px solid var(--border);border-radius:var(--rs);width:auto;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:14px}
/* machine list */
.asset{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:11px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:box-shadow .15s,border-color .15s;text-align:left;width:100%;font-family:inherit}
.asset:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);border-color:var(--gold)}
.a-ic{width:46px;height:46px;border-radius:10px;background:#EAF1ED;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.a-main{flex:1;min-width:0}
.a-code{font-size:15px;font-weight:700;color:var(--t1)}
.a-mm{font-size:12.5px;color:var(--t2)}
.a-badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.bg-op{background:var(--pass-bg);color:var(--pass)}
.bg-flt{background:var(--warn-bg);color:var(--warn)}
.bg-out{background:var(--fail-bg);color:var(--fail)}
.chev{color:var(--t3);font-size:20px;flex-shrink:0}
/* hub */
.hub-head{background:var(--deep);color:#fff;border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:14px}
.hub-ic{width:54px;height:54px;border-radius:12px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.hub-code{font-size:19px;font-weight:800;letter-spacing:.01em}
.hub-mm{font-size:12.5px;color:#9FC4AE}
.hub-hours{font-size:11.5px;color:#cfe0d6;margin-top:3px}
.scan-note{font-size:11px;color:var(--t3);text-align:center;margin:-6px 0 14px}
.cta{display:block;width:100%;padding:16px;border-radius:var(--rs);border:none;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;text-align:center;background:var(--mid);color:#fff;margin-bottom:16px}
.sec-h{font-size:11px;font-weight:800;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;margin:18px 2px 8px}
.tile{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #EEF2F0;cursor:pointer;text-align:left;width:100%;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit}
.tile .row:last-child{border-bottom:none}
.row-ic{width:30px;text-align:center;font-size:17px;flex-shrink:0}
.row-main{flex:1;min-width:0}
.row-t{font-size:14px;font-weight:600;color:var(--t1)}
.row-s{font-size:11.5px;color:var(--t2)}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px}
.lift{background:var(--gold-l);color:#3a2c00;border-radius:var(--r);padding:13px 15px;margin-top:10px;font-size:12.5px;font-weight:600;line-height:1.7}
.lift b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;color:#5a4400}
.svc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.svc-row{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0}
.svc-row span:first-child{color:var(--t2)}
.svc-row span:last-child{font-weight:600}
.btn-ghost{display:block;width:100%;padding:13px;border-radius:var(--rs);border:1.5px solid var(--border);background:#fff;color:var(--deep);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;margin-top:11px}
.spend{display:flex;gap:10px;margin-top:10px}
.spend div{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.spend b{display:block;font-size:18px;color:var(--deep)}
.spend small{font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
/* gate */
.gate-hero{padding:18px 18px 16px;text-align:center;border-radius:var(--r) var(--r) 0 0;color:#fff}
.gate-hero.green{background:linear-gradient(135deg,#1B6E3A,#13502A)}
.gate-hero.amber{background:linear-gradient(135deg,#A06000,#7A4A00)}
.gate-hero.red{background:linear-gradient(135deg,#A32D2D,#7E2020)}
.gate-ic{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;margin:0 auto 9px;font-size:24px}
.gate-title{font-size:17px;font-weight:800}
.ps-fd{margin-top:11px;border-top:1px dashed var(--border);padding-top:11px}
.gate-asset{font-size:13px;color:rgba(255,255,255,.8);margin-top:5px}
.gate-msg{font-size:14px;font-weight:600;background:rgba(0,0,0,.12);border-radius:9px;padding:11px 14px;margin:16px 16px 0;line-height:1.45}
.panel{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:16px;margin-bottom:18px}
.check{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid #EEF2F0}
.check:last-child{border-bottom:none}
.ck-dot{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;margin-top:1px}
.ck-pass{background:var(--pass)} .ck-warn{background:var(--warn)} .ck-fail{background:var(--fail)}
.ck-name{font-size:13.5px;font-weight:600;color:var(--t1)}
.ck-detail{font-size:12px;color:var(--t2);margin-top:1px}
.btn{display:block;width:100%;padding:15px;border-radius:var(--rs);border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;margin-top:6px}
.btn-green{background:var(--pass);color:#fff}
.btn-amber{background:var(--warn);color:#fff}
.ovr{background:var(--warn-bg);border:1px solid #EAD2A0;border-radius:var(--rs);padding:14px;margin-top:14px}
.ovr label{font-size:12.5px;font-weight:700;color:var(--warn);display:block;margin-bottom:6px}
.ovr input,.ovr textarea{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;margin-bottom:10px;outline:none}
.notify{font-size:12.5px;color:var(--fail);font-weight:600;text-align:center;margin-top:6px}
/* prestart checklist */
.ps-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:9px}
.ps-item.crit{border-color:#E2A6A6}
.ps-cat{font-size:10.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin:16px 2px 7px}
.ps-crit{font-size:9px;font-weight:800;color:#fff;background:#A32D2D;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;margin-left:6px;white-space:nowrap}
.ps-q{font-size:14px;font-weight:600;margin-bottom:9px}
.seg{display:flex;gap:8px}
.seg button{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--t2)}
.seg button.p.on{background:var(--pass);color:#fff;border-color:var(--pass)}
.seg button.f.on{background:var(--fail);color:#fff;border-color:var(--fail)}
.ps-field{margin-bottom:12px}
.ps-field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.ps-field input,.ps-field textarea,.ps-field select{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;outline:none;background:#fff;color:var(--t1)}
.ps-field input[type=number]{-moz-appearance:textfield}
.ps-field input::-webkit-outer-spin-button,.ps-field input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
/* sheet */
.sheet-bk{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.sheet-bk.on{display:flex}
.sheet{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:560px;padding:20px 16px calc(28px + env(safe-area-inset-bottom))}
.sheet h3{font-size:16px;color:var(--deep);margin-bottom:4px}
.sheet p{font-size:12.5px;color:var(--t2);margin-bottom:14px}
.wbtn{width:100%;text-align:left;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:13px;margin-bottom:9px;cursor:pointer;font-family:inherit}
.wbtn b{font-size:14px;color:var(--t1)} .wbtn span{display:block;font-size:11.5px;color:var(--t2);margin-top:2px}
.demobar{position:fixed;bottom:0;left:0;right:0;background:var(--deep);color:var(--gold-l);font-size:11px;font-weight:600;text-align:center;padding:7px;z-index:40;letter-spacing:.05em}
/* QR stickers */
.qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.qr-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center}
.qr-brand{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.qr-imgwrap img{width:var(--qs,150px);height:var(--qs,150px);image-rendering:pixelated}
.qr-grid.qr-one{grid-template-columns:1fr;max-width:300px;margin:0 auto}
/* director/manager platform (Gearbelt-style) */
.plat-tabs{display:flex;gap:4px;background:linear-gradient(135deg,#F8F9FA 0%,#E9ECEF 100%);border-radius:10px;padding:4px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.1);overflow-x:auto}
.plat-tab{flex:1 0 auto;padding:10px 14px;border:none;border-radius:7px;background:transparent;color:#666;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;letter-spacing:.3px;transition:all .2s}
.plat-tab.on{background:linear-gradient(135deg,#B8960C 0%,#D4A72C 100%);color:#fff;box-shadow:0 2px 4px rgba(184,150,12,.3)}
.an-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:760px){.an-grid{grid-template-columns:1fr 1fr}}
.chart-box{position:relative;height:240px}
/* fcard sections — matches the WHS app (gold top-line + green/gold header bar) */
.fcard{background:linear-gradient(135deg,#fff 0%,#f8f9fa 100%);border-radius:8px;border:1px solid #E8E8E8;border-top:3px solid #D4AF37;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.12);margin-bottom:14px}
.fcard-hdr{background:linear-gradient(135deg,#1B3A2D 0%,#0F2419 100%);padding:11px 15px;font-size:10.5px;font-weight:600;color:#D4AF37;letter-spacing:.08em;text-transform:uppercase;box-shadow:0 2px 4px rgba(27,58,45,.2)}
.fcard-body{padding:12px}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:680px){.kpis{grid-template-columns:repeat(4,1fr)}}
.kpi{border-radius:10px;padding:14px;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.1);border:1.5px solid}
.kpi-l{font-size:9px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;opacity:.85}
.kpi-row{display:flex;align-items:center;justify-content:center;gap:9px}
.kpi-ic{font-size:23px;line-height:1}
.kpi-v{font-size:30px;font-weight:800;line-height:1}
.kpi-tr{font-size:11px;font-weight:800;align-self:flex-start}
.kpi.k-blue{background:linear-gradient(135deg,#EAF2F8 0%,#CFE3F2 100%);border-color:#9EC3DA;color:#1F495C}
.kpi.k-green{background:linear-gradient(135deg,#E9F6EE 0%,#C7EAD4 100%);border-color:#9BD3AE;color:#13502A}
.kpi.k-amber{background:linear-gradient(135deg,#FFF6E6 0%,#FBE2B0 100%);border-color:#E6C57A;color:#8A5A00}
.kpi.k-red{background:linear-gradient(135deg,#FBECEC 0%,#F6CFCF 100%);border-color:#E2A6A6;color:#8E2525}
.spend-hero{background:linear-gradient(135deg,#1B3A2D 0%,#2D6A45 100%);color:#fff;border-radius:10px;padding:15px;box-shadow:0 4px 14px rgba(27,58,45,.25);border:1px solid rgba(184,150,12,.4)}
.spend-hero .s-l{font-size:9px;color:#BFD9C9;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:6px}
.spend-hero .s-v{font-size:26px;font-weight:800;color:var(--gold-l);line-height:1}
.spend-hero .s-tr{font-size:11px;font-weight:800;color:#7FE0A6;margin-top:6px}
.spend-mini{background:linear-gradient(135deg,#EAF2F8 0%,#CFE3F2 100%);border:1.5px solid #9EC3DA;border-radius:10px;padding:15px;color:#1F495C}
.spend-mini .s-l{font-size:9px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;opacity:.8;margin-bottom:6px}
.spend-mini .s-v{font-size:26px;font-weight:800;line-height:1}
table.reg{width:100%;border-collapse:collapse;font-size:12.5px;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
table.reg th{text-align:left;padding:9px 11px;background:#EAF1ED;color:var(--t2);font-size:10px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
table.reg td{padding:10px 11px;border-top:1px solid #EEF2F0;white-space:nowrap;vertical-align:top}
table.reg tbody tr{cursor:pointer}
table.reg tbody tr:hover{background:#F6FAF7}
.qr-code{font-size:16px;font-weight:800;color:var(--t1);margin-top:6px}
.qr-mm{font-size:11px;color:var(--t2)}
.qr-cap{font-size:9.5px;color:var(--t3);margin-top:4px}
@media print{
  .topbar,.demobar,.qr-noprint{display:none!important}
  body{background:#fff;padding-bottom:0}
  .qr-card{border:1px dashed #999;page-break-inside:avoid}
}
/* director/manager platform — full width on laptop */
.platform-wrap{max-width:1380px!important;width:100%;margin:0 auto;padding:24px clamp(16px,4vw,44px)!important}
@media(min-width:900px){
  .platform-wrap .h1{font-size:25px}
  .platform-wrap table.reg{font-size:13px}
  .platform-wrap table.reg th{font-size:10.5px;padding:11px 13px}
  .platform-wrap table.reg td{padding:12px 13px}
}
/* assets register polish */
.reg-toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.reg-legend{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--t3)}
.reg-legend span{display:inline-flex;align-items:center;gap:5px}
.lg-dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.reg-asset{display:flex;align-items:center;gap:10px}
.reg-asset .ric{width:34px;height:34px;border-radius:9px;background:#EAF1ED;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
table.reg td.t-asset{min-width:168px}
table.reg tr.attn-red{background:#FCEAEA}
table.reg tr.attn-amber{background:#FFF1DC}
table.reg tr.attn-red:hover{background:#F8DEDE}
table.reg tr.attn-amber:hover{background:#FCE7C6}
table.reg tr.attn-red td:first-child{box-shadow:inset 3px 0 0 #C0392B}
table.reg tr.attn-amber td:first-child{box-shadow:inset 3px 0 0 #E08A1E}
.cell-sub{color:var(--t3);font-size:11px;margin-top:2px;font-weight:400}
.svc-go{font-weight:700}
.svc-go.ok{color:var(--pass)} .svc-go.soon{color:var(--warn)} .svc-go.over{color:var(--fail)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="sb"></div>
<div class="topbar">
  <div class="topbar-row">
    <button class="back-btn" onclick="plantGoBack()" aria-label="Back to app"><svg viewBox="0 0 24 24" fill="none"><polyline points="15 18 9 12 15 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <div class="tbar-logo"><img src="Slan_Safety_No_Border_1.png" alt="Slán Safety"></div>
    <span class="tb-spacer"></span>
  </div>
  <div class="hdr-bottom">
    <div class="form-greeting" id="tb-greet"><h1 id="tb-title">Plant &amp; Equipment</h1><p id="tb-sub">Scan a machine's QR — or tap one below — to open its records.</p></div>
    <div id="tb-right"><button class="who" onclick="openWorkerSheet()"><span id="who-name">—</span></button></div>
  </div>
</div>

<div class="wrap" id="screen-list">
  <div id="asset-list"></div>
</div>

<div class="wrap" id="screen-detail" style="display:none"></div>
<div id="screen-oversight" style="display:none"></div>

<div class="sheet-bk" id="worker-sheet" onclick="if(event.target===this)closeWorkerSheet()">
  <div class="sheet">
    <h3>View as worker</h3>
    <p>Switch operator to see how the Ticket Gate responds — green, amber or red.</p>
    <div id="worker-btns"></div>
  </div>
</div>

<div class="sheet-bk" id="profile-sheet" onclick="if(event.target===this)closeProfile()">
  <div class="sheet">
    <h3>Profile</h3>
    <div id="profile-body"></div>
  </div>
</div>

<div class="sheet-bk" id="msg-sheet">
  <div class="sheet">
    <div id="msg-body"></div>
    <button id="msg-ok" class="btn btn-green" style="margin-top:16px">Done</button>
  </div>
</div>

<div class="demobar">DEMO — sample data</div>

<script>
/* ---------- helpers ---------- */
function dOffset(days){ var d=new Date(); d.setDate(d.getDate()+days); return d; }
function iso(d){ return d.toISOString().slice(0,10); }
function fmt(d){ return new Date(d).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}); }
function fmtShort(d){ return new Date(d).toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }

/* ---------- TICKET GATE (verified) ---------- */
function ticketGate(w, a){
  var today=new Date(); today.setHours(0,0,0,0);
  var checks=[];
  function add(name,status,detail){ checks.push({name:name,status:status,detail:detail}); }
  if(a.status==='out_of_service'||a.status==='retired'){ add('Machine availability','fail','This machine is '+a.status.replace('_',' ')+' and must not be operated.'); }
  else { add('Machine availability','pass','Machine is available for use.'); }
  if(a.critical_fault){ add('Open critical fault','fail','This machine has an open critical fault. Do not operate.'); }
  else if(a.status==='fault_reported'){ add('Reported fault','warn','A fault has been reported on this machine — supervisor sign-off required.'); }
  if(a.rego_expiry){
    if(new Date(a.rego_expiry)<today){ add('Registration','fail','Registration expired '+fmt(a.rego_expiry)+'.'); }
    else { add('Registration','pass','Registered to '+fmt(a.rego_expiry)+'.'); }
  }
  if(a.insurance_expiry){ if(new Date(a.insurance_expiry)<today){ add('Insurance','fail','Insurance expired '+fmt(a.insurance_expiry)+'.'); } }
  (a.required||[]).forEach(function(cls){
    var t=w.tickets.find(function(x){return x.cls===cls;});
    if(!t){ add('Holds '+licName(cls),'fail','You do not hold a '+licName(cls)+'.'); return; }
    var exp=t.expiry?new Date(t.expiry):null;
    if(exp && exp<today){ add('Holds '+licName(cls),'fail','Your '+licName(cls)+' expired '+fmt(t.expiry)+'.'); return; }
    if(exp){ var d=daysBetween(t.expiry,today);
      if(d<=30){ add('Holds '+licName(cls),'warn','Your '+licName(cls)+' expires in '+d+' day'+(d===1?'':'s')+' ('+fmt(t.expiry)+').'); return; }
      if(d<=60){ add('Holds '+licName(cls),'warn','Your '+licName(cls)+' expires in '+d+' days — renew soon.'); return; } }
    add('Holds '+licName(cls),'pass',licName(cls)+' current to '+fmt(t.expiry)+(t.verified?'':' (not yet verified).'));
  });
  if(a.voc_required){
    var v=(w.voc||[]).find(function(x){return x.make===a.make && x.model===a.model;});
    if(v){ add('Verification of Competency','pass','VOC on file for '+a.make+' '+a.model+'.'); }
    else { add('Verification of Competency','warn','No VOC on file for '+a.make+' '+a.model+' — supervisor sign-off required.'); }
  }
  if(w.induction_expiry && new Date(w.induction_expiry)<today){ add('Site induction','warn','Your induction is overdue for renewal.'); }
  if(a.service_due && new Date(a.service_due)<today){ add('Service currency','warn','Machine service is overdue (due '+fmt(a.service_due)+').'); }
  var hasFail=checks.some(function(c){return c.status==='fail';});
  var hasWarn=checks.some(function(c){return c.status==='warn';});
  var outcome=hasFail?'red':(hasWarn?'amber':'green');
  var first=(checks.filter(function(c){return c.status==='fail';})[0]) || (checks.filter(function(c){return c.status==='warn';})[0]);
  var msg = outcome==='green' ? 'You are authorised to operate '+a.code+' — '+a.make+' '+a.model+'.' : (first?first.detail:'');
  return { outcome:outcome, canProceed:outcome!=='red', requiresOverride:outcome==='amber', checks:checks, primary_message:msg };
}

function submitPrestart(){

  if(!raw || isNaN(reading)){ slanMsg('Enter the reading','<div style="font-size:13.5px;color:var(--t2);line-height:1.5">Please enter the current '+(km?'odometer (km)':'hours')+' reading off the machine.</div>'); return; }

  if(km){ if(PLANT_DETAILS[a.code]) PLANT_DETAILS[a.code].km=reading; } else { a.hours=reading; }
  var faults=faultIdx.length;
  var criticalFault = faults>0 && faultIdx.some(function(k){ var sev=document.getElementById('ps-sev'+k); return (_psList[+k]&&_psList[+k].crit) || (sev&&/Critical/.test(sev.value)); });
  var body;

  else if(faults>0){ a.status='fault_reported'; body='<div style="text-align:center"><div style="font-size:42px">⚠️</div><div style="font-size:16px;font-weight:800;color:var(--warn);margin-top:6px">Fault reported</div><div style="font-size:13px;color:var(--t2);margin-top:8px;line-height:1.55">'+faults+' fault'+(faults>1?'s':'')+' flagged on '+a.code+' → a work order has been raised and sent to the mechanic.</div></div>'; }
  else { body='<div style="text-align:center"><div style="font-size:42px">✅</div><div style="font-size:16px;font-weight:800;color:var(--pass);margin-top:6px">Pre-start complete</div><div style="font-size:13px;color:var(--t2);margin-top:8px;line-height:1.55">'+a.code+' is good to go. Saved against '+currentWorker.name+' and the machine record.</div></div>'; }
  slanMsg('', body, function(){ psState={}; renderAssets(); showList(); });
}

function renderQR(oneCode){
  QR_ONE=oneCode||null;
  var base=location.origin+location.pathname, px=_qrPx(), cols=oneCode?1:_qrCols();
  var list = oneCode ? ASSETS.filter(function(a){return a.code===oneCode;}) : ASSETS;
  var cards=list.map(function(a){
    var url=base+'?machine='+a.code, img='';
    try{ var qr=qrcode(0,'M'); qr.addData(url); qr.make(); img=qr.createImgTag(5,6); }
    catch(e){ img='<div style="font-size:10px;color:#A32D2D;padding:30px 0">QR unavailable</div>'; }
    return '<div class="qr-card"><div class="qr-brand">Slán Safety</div><div class="qr-imgwrap" style="--qs:'+px+'px">'+img+'</div><div class="qr-code">'+a.code+'</div><div class="qr-mm">'+a.make+' '+a.model+'</div><div class="qr-cap">Scan to open pre-start &amp; machine info</div></div>';
  }).join('');
  function sb(s,l){ var on=QR_SIZE===s; return '<button onclick="plantSetQRSize(\''+s+'\')" style="padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid '+(on?'#B8960C':'#D8D8D8')+';background:'+(on?'#B8960C':'#fff')+';color:'+(on?'#fff':'#666')+'">'+l+'</button>'; }
  var backTo = oneCode ? ('openHub('+ASSETS.map(function(a){return a.code;}).indexOf(oneCode)+')') : 'renderOversight()';
  var html='<div class="wrap" style="padding:0;max-width:none">'+
    '<button class="back qr-noprint" onclick="'+backTo+'">‹ Back</button>'+
    '<div class="h1">QR Sticker'+(oneCode?'':'s')+'</div>'+
    '<div class="sub qr-noprint">'+(oneCode?('Print and stick on '+oneCode+'.'):'Print and stick one on each machine.')+' Scanning opens that machine\'s pre-start.</div>'+
    '<div class="qr-noprint" style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:12px;color:var(--t2)">Size:</span>'+sb('S','Small · 9 per A4')+sb('M','Medium · 4 per A4')+sb('L','Large · 1 per A4')+'</div>'+
    '<button class="cta qr-noprint" onclick="window.print()" style="margin-bottom:14px">🖨  Print</button>'+
    '<div class="qr-grid'+(oneCode?' qr-one':'')+'" style="grid-template-columns:repeat('+cols+',1fr)">'+cards+'</div>'+
    '</div>';
  showDetail(html);
}

/* ---------- init ---------- */
document.getElementById('who-name').textContent=currentWorker.name;
renderAssets();
(function(){
  // QR deep-link: plant.html?machine=EXC-001 opens straight to that machine's hub
  var m=/[?&]machine=([^&]+)/.exec(location.search);
  var code=m?decodeURIComponent(m[1]).toUpperCase():null;
  if(code){ var idx=-1; ASSETS.forEach(function(a,i){ if(a.code===code) idx=i; }); if(idx>-1){ openHub(idx); return; } }
  if(['manager','supervisor','director'].indexOf(getRole())>-1) renderOversight();
})();
</script>
